name: Workflow CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "MLProject/trained_artifacts/**"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest

    env:
      DAGSHUB_OWNER: ${{ secrets.DAGSHUB_OWNER }}
      DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}

      DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      IMAGE_NAME: diabetes-mlflow-ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          pip install \
            mlflow==2.19.0 \
            dagshub==0.7.0 \
            optuna==4.9.0 \
            numpy==2.4.6 \
            pandas==2.3.3 \
            matplotlib==3.11.0 \
            seaborn==0.13.2 \
            scikit-learn==1.9.0 \
            python-dotenv

      - name: Run mlflow project
        working-directory: MLProject
        run: |
          mlflow run . --env-manager=local 2>&1 | tee ../train.log

      - name: Get latest MLflow run id
        run: |
          RUN_ID=$(grep -oP 'Run ID:\s*\K.*' train.log | tail -n 1 | tr -d '\r')

          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

          echo "Run ID ditemukan:"
          echo "$RUN_ID"

          test -n "$RUN_ID"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0

      - name: Upload to GitHub
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import mlflow

          run_id = os.environ["RUN_ID"]

          output_dir = Path("MLProject/trained_artifacts")
          output_dir.mkdir(parents=True, exist_ok=True)

          mlflow.artifacts.download_artifacts(
              artifact_uri=f"runs:/{run_id}/model",
              dst_path=str(output_dir),
          )

          print(f"Artifact tersimpan di {output_dir}")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add MLProject/trained_artifacts

          if git diff --cached --quiet; then
            echo "Tidak ada artifact baru"
            exit 0
          fi

          git commit -m "Update trained artifacts [skip ci]"
          git push

      - name: Build Docker Model
        run: |
          mlflow models build-docker \
            -m "runs:/${RUN_ID}/model" \
            -n "${IMAGE_NAME}"

      - name: Log in to Docker Hub
        run: |
          echo "${DOCKER_TOKEN}" | docker login \
            -u "${DOCKER_USERNAME}" \
            --password-stdin

      - name: Tag Docker Image
        run: |
          docker tag \
            "${IMAGE_NAME}:latest" \
            "${DOCKER_USERNAME}/${IMAGE_NAME}:${{ github.run_number }}"

          docker tag \
            "${IMAGE_NAME}:latest" \
            "${DOCKER_USERNAME}/${IMAGE_NAME}:latest"

      - name: Push Docker Image
        run: |
          docker push \
            "${DOCKER_USERNAME}/${IMAGE_NAME}:${{ github.run_number }}"

          docker push \
            "${DOCKER_USERNAME}/${IMAGE_NAME}:latest"